name: Build iOS18 WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.0.app || true
          xcodebuild -version

      - name: Show SDK
        run: |
          xcodebuild -showsdks

      - name: Resolve Packages
        run: |
          xcodebuild \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -resolvePackageDependencies

      - name: Build WDA
        run: |
          mkdir -p build

          xcodebuild clean build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination generic/platform=iOS \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty

      - name: Find App
        run: |
          find . -name "*.app"

      - name: Package IPA
        run: |
          mkdir Payload

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WebDriverAgentRunner-Runner.app" | head -n 1)

          echo "APP_PATH=$APP_PATH"

          cp -R "$APP_PATH" Payload/

          zip -r WebDriverAgentRunner.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-iOS18
          path: WebDriverAgentRunner.ipa
