name: Build WebDriverAgent IPA (Fully Signed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Install npm dependencies
        run: npm install

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Download development certificate
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          fastlane cert \
            --username "${{ secrets.APPLE_ID }}" \
            --development \
            --output_path ./certs \
            --skip_set_partition_list
          TEAM_ID=$(security find-identity -v -p codesigning \
            | grep -E "Apple Development|iPhone Developer" \
            | head -1 \
            | grep -oE '\([A-Z0-9]+\)' \
            | tr -d '()')
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "Team ID: $TEAM_ID"

      - name: Register device
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          fastlane run register_device \
            name:"iPhone" \
            udid:"${{ vars.DEVICE_UDID }}" \
            username:"${{ secrets.APPLE_ID }}" \
            team_id:"$TEAM_ID"

      - name: Download provisioning profiles (runner + xctest bundle)
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          mkdir -p ./profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          for BUNDLE_ID in \
            "com.facebook.WebDriverAgentRunner.xctrunner" \
            "com.facebook.WebDriverAgentRunner"; do
            fastlane sigh \
              --username "${{ secrets.APPLE_ID }}" \
              --team_id "$TEAM_ID" \
              --app_identifier "$BUNDLE_ID" \
              --development \
              --force \
              --output_path ./profiles
          done

          # Install all profiles so Xcode can find them
          for p in ./profiles/*.mobileprovision; do
            UUID=$(security cms -D -i "$p" \
              | plutil -extract UUID xml1 -o - - \
              | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
            cp "$p" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"
            echo "Installed: $UUID"
          done

      - name: Build with full signing
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/DerivedData" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Verify signatures and package
        run: |
          APP=$(find DerivedData/Build/Products \
            -name "WebDriverAgentRunner-Runner.app" \
            | grep -v simulator | head -1)
          echo "App: $APP"
          echo "=== Signature check ==="
          codesign -d -v "$APP" 2>&1 || true
          codesign -d -v "$APP/PlugIns/WebDriverAgentRunner.xctest" 2>&1 || true
          echo "======================"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r WebDriverAgent.ipa Payload/
          ls -lh WebDriverAgent.ipa

      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-iOS18-fully-signed
          path: WebDriverAgent.ipa
          retention-days: 7
